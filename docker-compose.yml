version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hrdc_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lpu_hrdc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lpu_hrdc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrdc_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/lpu_hrdc
      - SECRET_KEY=78d1fb7e34ef62ba76a6e7681c2f90a9b6c085de51ad51892dfd6a89efb36ad5
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile # Use similar build steps or build standard Node
      # Note: For production compose, we run next build and start
    image: node:20-slim
    container_name: hrdc_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && npm run start"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
